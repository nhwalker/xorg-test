image:
  # Registry image by default. For a local, never-pulled image (built with
  # podman and imported into the node's runtime), set repository to the
  # imported name and pullPolicy to Never.
  repository: desktop-container
  tag: latest
  pullPolicy: IfNotPresent

gpu:
  # When true, the pod requests NVIDIA GPU injection via a CDI annotation.
  # Requires on the node: NVIDIA driver, /etc/cdi/nvidia.yaml (generated by
  # install.sh --host-prep-only), and CDI support enabled in CRI-O.
  enabled: false
  # CDI device name injected via the cdi.k8s.io/gpu pod annotation.
  cdiDevice: nvidia.com/gpu=all
  # Exported as NVIDIA_DRIVER_CAPABILITIES.
  driverCapabilities: all

hostPaths:
  # Host udev database (read-only): device enumeration + seat tags.
  udev: /run/udev
  # Exported X socket dir: host/other containers use DISPLAY=:0.
  x11Socket: /tmp/.X11-unix
  # Exported audio sockets (PipeWire native + Pulse).
  audioSocket: /run/desktop-audio

# Privileged initContainer that chmods the exported socket dirs to 1777
# (hostPath DirectoryOrCreate creates them 0755 root, which would block the
# in-container desktop user from creating sockets).
initPerms:
  enabled: true

# Grace period for systemd to shut the session down cleanly after the
# image's STOPSIGNAL (SIGRTMIN+3).
terminationGracePeriodSeconds: 60

# Ready only when a real X connection succeeds (xdpyinfo handshake).
readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10

# Off by default: systemd + the in-container Restart=always on the session
# already handle recovery; a liveness kill would reboot the whole desktop.
livenessProbe:
  enabled: false
  initialDelaySeconds: 60
  periodSeconds: 30

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
