# Installed as /etc/pipewire/pipewire-pulse.conf.d/10-desktop-audio-export.conf
#
# Serve the PulseAudio protocol on the default per-user socket AND on a
# socket in the shared export directory (bind-mounted from the host), so
# Pulse clients on the host or in other containers can connect with:
#   PULSE_SERVER=unix:/run/desktop-audio/pulse
#
# Dictionary sections in conf.d fragments are merged, so this replaces the
# stock server.address list; "unix:native" keeps the default socket.
pulse.properties = {
    server.address = [
        "unix:native"
        "unix:/run/desktop-audio/pulse"
    ]
}
